name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  build:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ailloy-v${GITHUB_REF_NAME#v}-${{ matrix.target }}.tar.gz ailloy
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          Compress-Archive -Path "target/${{ matrix.target }}/release/ailloy.exe" -DestinationPath "ailloy-v$version-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ailloy-${{ matrix.target }}
          path: ailloy-v*.*

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  homebrew:
    name: Update Homebrew Tap
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute checksums and update formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          SHA_LINUX=$(sha256sum artifacts/ailloy-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          SHA_MAC_X86=$(sha256sum artifacts/ailloy-v${VERSION}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_MAC_ARM=$(sha256sum artifacts/ailloy-v${VERSION}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)

          FORMULA=$(cat <<'RUBY'
          class Ailloy < Formula
            desc "An AI abstraction layer for Rust"
            homepage "https://github.com/mklab-se/ailloy"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/mklab-se/ailloy/releases/download/v#{version}/ailloy-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_MAC_ARM_PLACEHOLDER"
              else
                url "https://github.com/mklab-se/ailloy/releases/download/v#{version}/ailloy-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_MAC_X86_PLACEHOLDER"
              end
            end

            on_linux do
              url "https://github.com/mklab-se/ailloy/releases/download/v#{version}/ailloy-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "SHA_LINUX_PLACEHOLDER"
            end

            def install
              bin.install "ailloy"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/ailloy --version")
            end
          end
          RUBY
          )

          FORMULA="${FORMULA//VERSION_PLACEHOLDER/$VERSION}"
          FORMULA="${FORMULA//SHA_MAC_ARM_PLACEHOLDER/$SHA_MAC_ARM}"
          FORMULA="${FORMULA//SHA_MAC_X86_PLACEHOLDER/$SHA_MAC_X86}"
          FORMULA="${FORMULA//SHA_LINUX_PLACEHOLDER/$SHA_LINUX}"

          CONTENT=$(echo "$FORMULA" | base64 -w 0)

          # Check if file exists
          EXISTING=$(curl -s -H "Authorization: token ${HOMEBREW_TAP_TOKEN}" \
            "https://api.github.com/repos/mklab-se/homebrew-tap/contents/Formula/ailloy.rb" || true)

          SHA=$(echo "$EXISTING" | jq -r '.sha // empty')

          if [ -n "$SHA" ]; then
            curl -X PUT -H "Authorization: token ${HOMEBREW_TAP_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/mklab-se/homebrew-tap/contents/Formula/ailloy.rb" \
              -d "{\"message\":\"Update ailloy to ${VERSION}\",\"content\":\"${CONTENT}\",\"sha\":\"${SHA}\"}"
          else
            curl -X PUT -H "Authorization: token ${HOMEBREW_TAP_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/mklab-se/homebrew-tap/contents/Formula/ailloy.rb" \
              -d "{\"message\":\"Add ailloy ${VERSION}\",\"content\":\"${CONTENT}\"}"
          fi

  crates-io:
    name: Publish to crates.io
    needs: ci
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
